name: check

on:
  pull_request:
  push:
    branches: [main]

# A PR that is superseded should stop burning runners, but never cancel main.
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e core -e plugins/cmux -e plugins/agent-bridge -e plugins/discord

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      # Round 1 must be verifiable with no live external service. Anything that
      # needs a real host or a real chat platform belongs behind a fixture, not
      # in CI — a suite that can only pass on one machine proves nothing here.
      - name: Tests
        run: pytest
